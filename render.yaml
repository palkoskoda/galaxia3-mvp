services:
  - type: web
    name: galaxia3-mvp
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: /tmp/galaxia3.db
      - key: CORS_ORIGIN
        value: https://galaxia3-mvp.onrender.com
