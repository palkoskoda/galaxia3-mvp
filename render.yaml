services:
  - type: web
    name: galaxia3-mvp
    runtime: node
    plan: free
    buildCommand: |
      npm install --legacy-peer-deps &&
      cd backend && npm install --legacy-peer-deps &&
      cd ../frontend && npm install --legacy-peer-deps &&
      cd .. &&
      npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: galaxia3-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://galaxia3-mvp.onrender.com

databases:
  - name: galaxia3-db
    plan: free
    databaseName: galaxia3
    user: galaxia3
